[env:uiapduino_pro]
platform = https://github.com/Community-PIO-CH32V/platform-ch32v.git
board = ch32v003f4p6_evt_r0
framework = noneos-sdk
upload_protocol = minichlink
upload_flags =
    -c
    0x1209b003

; noneos-sdk が ch32v003fun 相当のベアメタル環境を提供するため lib_deps 不要
; (ch32v003fun は noneos-sdk と競合するため使用しない)

; コンパイルオプション
build_flags =
    -DBOARD_UIAPDUINO_PRO

monitor_speed = 115200
